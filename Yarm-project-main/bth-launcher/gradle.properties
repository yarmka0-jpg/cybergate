# ---------- JVM ----------
org.gradle.jvmargs=-Xmx2048m -XX:+UseParallelGC -Dfile.encoding=UTF-8

# ---------- Build speed ----------
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
kotlin.incremental=true

# ---------- AndroidX ----------
android.useAndroidX=true
android.nonTransitiveRClass=true
android.nonFinalResIds=true
android.enableJetifier=false

# ---------- Kotlin ----------
kotlin.code.style=official

# ---------- Suppress AGP 8.1 / compileSdk 34 warning ----------
android.suppressUnsupportedCompileSdk=34

# ---------- TLS (handshake fix for dl.google.com on some devices) ----------
systemProp.https.protocols=TLSv1.2,TLSv1.3
systemProp.jdk.tls.client.protocols=TLSv1.2,TLSv1.3
